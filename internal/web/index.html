<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowly</title>
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: #1f2b47;
  --bg-hover: #253354;
  --text-primary: #e6e6e6;
  --text-secondary: #8892a4;
  --accent: #4fc3f7;
  --accent-dim: #2196f3;
  --border: #2a2a4a;
  --info: #4fc3f7;
  --warn: #ffd54f;
  --error: #ef5350;
  --debug: #78909c;
  --success: #66bb6a;
  --radius: 8px;
}
/* Themes */
[data-theme="ocean"] {
  --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-card: #1c2333;
  --bg-hover: #263044; --text-primary: #e6edf3; --text-secondary: #7d8590;
  --accent: #58a6ff; --accent-dim: #1f6feb; --border: #30363d;
}
[data-theme="sunset"] {
  --bg-primary: #1a1210; --bg-secondary: #231916; --bg-card: #2d201a;
  --bg-hover: #3d2e24; --text-primary: #f0e6d8; --text-secondary: #9a8a78;
  --accent: #f0926a; --accent-dim: #d47044; --border: #3a2e26;
}
[data-theme="forest"] {
  --bg-primary: #111a12; --bg-secondary: #16231a; --bg-card: #1c2b20;
  --bg-hover: #263a2a; --text-primary: #dce8de; --text-secondary: #7a9a80;
  --accent: #66bb6a; --accent-dim: #43a047; --border: #2a3d2c;
}
[data-theme="lavender"] {
  --bg-primary: #17131f; --bg-secondary: #1e1928; --bg-card: #262034;
  --bg-hover: #322c42; --text-primary: #e8e0f0; --text-secondary: #9488a8;
  --accent: #b39ddb; --accent-dim: #9575cd; --border: #332a42;
}
[data-theme="light"] {
  --bg-primary: #f5f5f5; --bg-secondary: #ffffff; --bg-card: #ffffff;
  --bg-hover: #e8e8e8; --text-primary: #1a1a1a; --text-secondary: #666666;
  --accent: #0d47a1; --accent-dim: #1565c0; --border: #d0d0d0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
}
/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
}
.header-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
  position: relative;
}
.theme-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 100;
  min-width: 140px;
  padding: 4px 0;
}
.theme-dropdown.show { display: block; }
.theme-dropdown .theme-option {
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}
.theme-dropdown .theme-option:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.theme-dropdown .theme-option.active {
  color: var(--accent);
}
.theme-dropdown .theme-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.header .subtitle {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.header .status-info {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  gap: 16px;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 4px;
}
.status-dot.on { background: var(--success); }
.status-dot.off { background: var(--error); }
/* Motto */
.motto-bar {
  padding: 6px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  overflow: hidden;
  white-space: nowrap;
}
.motto-bar .motto-icon { opacity: 0.5; }
.motto-bar .motto-text { opacity: 0.7; }
.motto-bar .motto-author { opacity: 0.4; margin-left: 6px; }
/* Layout */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}
/* Sidebar */
.sidebar {
  width: 180px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-item {
  padding: 14px 20px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  border-left: 3px solid transparent;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.sidebar-item.active {
  color: var(--accent);
  background: var(--bg-card);
  border-left-color: var(--accent);
}
/* Content */
.content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.tab-panel.active { display: flex; }
/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.btn {
  padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn.active { background: var(--accent-dim); color: #fff; border-color: var(--accent-dim); }
.btn-accent {
  background: var(--accent-dim);
  color: #fff;
  border-color: var(--accent-dim);
}
.btn-accent:hover { background: var(--accent); }
/* Log styles */
.log-container {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  font-size: 12px;
  line-height: 1.6;
}
.log-line {
  padding: 3px 10px;
  border-left: 3px solid transparent;
  display: flex;
  gap: 10px;
  position: relative;
  white-space: pre-wrap;
  word-break: break-all;
  cursor: pointer;
  border-radius: 0 4px 4px 0;
  transition: background 0.15s;
}
.log-line:hover { background: var(--bg-hover); }
.log-line .log-time { color: var(--text-secondary); white-space: nowrap; flex-shrink: 0; opacity: 0.7; }
.log-line .log-level {
  font-weight: 600; white-space: nowrap; flex-shrink: 0; min-width: 48px;
  font-size: 11px; letter-spacing: 0.3px;
}
.log-line .log-msg { flex: 1; color: var(--text-primary); }
.log-line.level-INFO { border-left-color: var(--info); }
.log-line.level-INFO .log-level { color: var(--info); }
.log-line.level-WARN { border-left-color: var(--warn); background: rgba(255,213,79,0.04); }
.log-line.level-WARN .log-level { color: var(--warn); }
.log-line.level-ERROR { border-left-color: var(--error); background: rgba(239,83,80,0.06); }
.log-line.level-ERROR .log-level { color: var(--error); }
.log-line.level-DEBUG { border-left-color: var(--debug); }
.log-line.level-DEBUG .log-level { color: var(--debug); }
.log-line.level-PLAIN { border-left-color: var(--border); opacity: 0.75; }
.log-line.level-INFO .log-msg::before { content: '💡 '; }
.log-line.level-WARN .log-msg::before { content: '⚠️ '; }
.log-line.level-ERROR .log-msg::before { content: '🔴 '; }
.log-line.level-DEBUG .log-msg::before { content: '🔍 '; }
/* Archive styles */
.archive-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.archive-sidebar {
  width: 280px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.archive-breadcrumb {
  padding: 12px;
  display: flex;
  gap: 6px;
  align-items: center;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.archive-breadcrumb select {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
}
.archive-breadcrumb span { color: var(--text-secondary); }
.file-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.2s;
}
.file-item:hover { background: var(--bg-hover); }
.file-item.selected { background: var(--bg-card); outline: 1px solid var(--accent-dim); }
.file-icon { font-size: 18px; flex-shrink: 0; }
.file-info { flex: 1; min-width: 0; }
.file-name {
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
/* Preview */
.preview-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.preview-toolbar {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.preview-title {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.preview-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.preview-content img {
  max-width: 100%;
  border-radius: var(--radius);
}
.preview-content .md-body {
  line-height: 1.8;
  font-size: 14px;
}
.md-body h1, .md-body h2, .md-body h3 { margin: 16px 0 8px; color: var(--accent); }
.md-body h1 { font-size: 20px; }
.md-body h2 { font-size: 17px; }
.md-body h3 { font-size: 15px; }
.md-body p { margin: 8px 0; }
.md-body code {
  background: var(--bg-secondary);
  padding: 2px 6px;
  border-radius: 3px;
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 13px;
}
.md-body pre {
  background: var(--bg-secondary);
  padding: 12px;
  border-radius: var(--radius);
  overflow-x: auto;
  margin: 8px 0;
}
.md-body pre code { background: none; padding: 0; }
.md-body a { color: var(--accent); text-decoration: none; }
.md-body a:hover { text-decoration: underline; }
.md-body blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}
.md-body ul, .md-body ol { padding-left: 20px; margin: 8px 0; }
.md-body li { margin: 4px 0; }
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--text-secondary);
  font-size: 14px;
}
/* History */
.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.history-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.2s;
}
.history-item:hover { background: var(--bg-hover); }
.tags-bar {
  padding: 8px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  min-height: 0;
  max-height: 50vh;
  overflow-y: auto;
}
.tag-item {
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.tag-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.tag-item.active { background: var(--info); color: #fff; }
.tag-item small { margin-left: 3px; opacity: 0.7; }
.tag-item.tag-toggle {
  background: var(--bg-hover);
  color: var(--accent);
  font-weight: 500;
  cursor: pointer;
}
.tag-item.tag-toggle:hover {
  background: var(--accent-dim);
  color: #fff;
}
.history-tags {
  display: flex;
  gap: 4px;
  margin-top: 4px;
  overflow: hidden;
}
.htag {
  font-size: 11px;
  padding: 1px 5px;
  border-radius: 3px;
  background: rgba(100,180,255,0.12);
  color: var(--info);
  white-space: nowrap;
}
.history-header {
  display: flex;
  align-items: center;
  gap: 8px;
}
.history-time { font-size: 12px; color: var(--text-secondary); font-family: monospace; }
.history-type {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 500;
}
.history-type.text { background: #1a3a5c; color: var(--info); }
.history-type.image { background: #1a3c1a; color: var(--success); }
.history-preview {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.history-detail {
  margin-top: 8px;
  padding: 10px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  font-size: 13px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
  position: relative;
}
.history-detail .copy-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  font-size: 11px;
}
.history-detail .copy-btn::before { content: '📋'; }
/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-card);
  color: var(--text-primary);
  padding: 8px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  border: 1px solid var(--border);
  transition: transform 0.3s;
  z-index: 100;
}
.toast.show { transform: translateX(-50%) translateY(0); }
/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
/* Checkbox toggle */
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  margin-left: auto;
}
.toggle-wrap input[type="checkbox"] { accent-color: var(--accent-dim); }
/* Stats */
.stats-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.stats-summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.stats-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.stats-card-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
}
.stats-card-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.chart-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.chart-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 12px;
}
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
canvas {
  width: 100%;
  display: block;
}
/* Publish dropdown */
.publish-dropdown {
  position: relative;
  display: inline-block;
}
.publish-menu {
  display: none;
  position: absolute;
  right: 0;
  top: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-width: 140px;
  z-index: 50;
  overflow: hidden;
}
.publish-menu.open { display: block; }
.publish-menu-item {
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-primary);
  transition: background 0.15s;
}
.publish-menu-item:hover { background: var(--bg-hover); }
.publish-menu-item.disabled {
  color: var(--text-secondary);
  cursor: not-allowed;
  opacity: 0.5;
}
/* Search */
.search-bar {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.search-bar input {
  flex: 1;
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  font-size: 13px;
  outline: none;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--text-secondary); }
.search-results {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.search-result-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.2s;
}
.search-result-item:hover { background: var(--bg-hover); }
.search-result-path {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.search-result-content {
  font-size: 13px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-highlight {
  background: rgba(79, 195, 247, 0.3);
  padding: 0 2px;
  border-radius: 2px;
}

/* Admin */
.admin-container {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.admin-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  width: 100%;
  max-width: 480px;
}
.admin-card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.admin-info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
}
.admin-label {
  font-size: 13px;
  color: var(--text-secondary);
}
.admin-value {
  font-size: 13px;
  color: var(--text-primary);
  font-family: 'SF Mono', 'Menlo', monospace;
}
.btn-danger {
  background: #c62828;
  color: #fff;
  border-color: #c62828;
  padding: 8px 24px;
  font-size: 13px;
}
.btn-danger:hover { background: #e53935; }
.admin-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.admin-actions .btn {
  flex: 1;
  min-width: 100px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 6px;
}
.btn-restart {
  background: #c62828;
  color: #fff;
  border-color: #c62828;
}
.btn-restart:hover { background: #e53935; color: #fff; }
.btn-update {
  background: linear-gradient(135deg, #1a73e8, #4fc3f7);
  color: #fff;
  border-color: transparent;
}
.btn-update:hover { opacity: 0.9; color: #fff; }
.btn-update:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-release {
  background: linear-gradient(135deg, #2e7d32, #66bb6a);
  color: #fff;
  border-color: transparent;
}
.btn-release:hover { opacity: 0.9; color: #fff; }
.btn-release:disabled { opacity: 0.5; cursor: not-allowed; }
/* === AI Settings Form === */
.admin-select, .admin-input {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 4px;
  padding: 6px 10px;
  font-size: 13px;
  width: 220px;
  outline: none;
}
.admin-select:focus, .admin-input:focus {
  border-color: var(--accent);
}
.admin-textarea {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 4px;
  padding: 8px;
  font-size: 13px;
  width: 100%;
  resize: vertical;
  font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
  outline: none;
  line-height: 1.5;
}
.admin-textarea:focus {
  border-color: var(--accent);
}
.ai-form-row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.ai-form-row:last-child { border-bottom: none; }
.ai-form-label {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  min-width: 90px;
}
.ai-form-col {
  display: flex;
  flex-direction: column;
  padding: 8px 0;
  gap: 6px;
  border-bottom: 1px solid var(--border);
}
.ai-save-btn {
  background: var(--accent-dim);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 8px 20px;
  font-size: 13px;
  cursor: pointer;
  margin-top: 8px;
}

/* === Mobile responsive === */
@media (max-width: 768px) {
  .header { padding: 10px 14px; }
  .header h1 { font-size: 16px; }
  .header .status-info { gap: 10px; font-size: 11px; }
  /* Sidebar → Top tab bar */
  .main-layout { flex-direction: column; }
  .sidebar {
    width: 100%;
    flex-direction: row;
    border-right: none;
    border-bottom: 1px solid var(--border);
    order: 0;
    flex-shrink: 0;
  }
  .sidebar-item {
    flex: 1;
    justify-content: center;
    padding: 10px 8px;

    border-left: none;
    border-bottom-color: var(--accent);

  .content { order: 1; }
  /* Toolbar: force single row */
  .toolbar { flex-wrap: nowrap; overflow-x: auto; gap: 4px; padding: 8px 10px; }

  /* Log */
  .log-line { flex-wrap: wrap; gap: 2px 6px; }

  /* Archive: stack vertically */
  .archive-layout { flex-direction: column; }

    width: 100%;

function showMotto() {
  const today = new Date();
  let m;
  if (today.getMonth() === 5 && today.getDate() === 13) {
    m = ['今天不仅是 Knowly 的版本号，也是创造者的诞辰', '祝生日快乐'];
  } else {
    m = mottos[Math.floor(Math.random() * mottos.length)];
  }
  document.getElementById('mottoBar').innerHTML =
    '<span class="motto-icon">&#9733;</span>' +
    '<span class="motto-text">' + m[0] + '</span>' +
    '<span class="motto-author">\u2014 ' + m[1] + '</span>';
}

// === State ===
let currentTab = 'logs';
let currentLevel = 'all';
let currentHistoryType = 'all';
let currentTagFilter = '';
let currentFilePath = '';
let currentFileContent = '';
let selectedFileItem = null;
let eventSource = null;

// === Tab ===
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');

  if (tab === 'logs') connectLogStream();
  else if (eventSource) { eventSource.close(); eventSource = null; }
  if (tab === 'archive' && document.getElementById('selYear').options.length <= 1) loadYears();
  if (tab === 'history') { loadTags(); loadHistory(); }
  if (tab === 'stats') loadStats();
  if (tab === 'admin') { loadAdminStatus(); loadAIConfig(); }
}

// === API Helper ===
async function api(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(res.statusText);
  return res.json();
}

// === Toast ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// === Clipboard ===
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('已复制');
}

// === Logs ===
async function loadLogs() {
  try {
    const lines = await api('/api/logs?level=' + currentLevel + '&limit=200');
    const container = document.getElementById('logContainer');
    container.innerHTML = '';
    lines.forEach(l => appendLogLine(l));
  } catch (e) { console.error(e); }
}

function appendLogLine(line) {
  const container = document.getElementById('logContainer');
  var key = (line.time || '') + '|' + (line.raw || line.message || '');
  if (container.firstChild && container.firstChild.dataset && container.firstChild.dataset.key === key) return;
  var next = container.firstChild;
  while (next && next.dataset && next.dataset.key === key) { next = next.nextElementSibling; }
  const div = document.createElement('div');
  var level = line.level || '';
  div.className = 'log-line level-' + (level || 'PLAIN');
  div.dataset.key = key;
  div.dataset.raw = line.raw || line.message || '';
  var levelBadge = level ? escHtml(level) : '<span style="opacity:0.3">·</span>';
  div.innerHTML =
    '<span class="log-time">' + escHtml((line.time || '').replace(/^\d{4}\//, '')) + '</span>' +
    '<span class="log-level">' + levelBadge + '</span>' +
    '<span class="log-msg">' + escHtml(line.message || line.raw || '') + '</span>';
  container.insertBefore(div, container.firstChild);
}

function filterLogs(level) {
  currentLevel = level;
  document.querySelectorAll('#panel-logs .toolbar .btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadLogs();
}

function connectLogStream() {
  if (eventSource) { eventSource.close(); }
  eventSource = new EventSource('/api/logs/stream');
  eventSource.onmessage = function(e) {
    const line = JSON.parse(e.data);
    appendLogLine(line);
  };
  eventSource.onerror = function() { eventSource.close(); eventSource = null; };
}

// === Archive ===
async function loadYears() {
  try {
    const entries = await api('/api/archive/list?path=');
    const sel = document.getElementById('selYear');
    sel.innerHTML = '<option value="">年份</option>';
    const now = new Date();
    const curYear = String(now.getFullYear());
    entries.filter(e => e.is_dir).sort((a, b) => b.name.localeCompare(a.name)).forEach(e => {
      sel.innerHTML += '<option value="' + e.name + '">' + e.name + ' 年</option>';
    });
    // 默认选中当前年份
    if (sel.querySelector('option[value="' + curYear + '"]')) {
      sel.value = curYear;
      await loadMonths(true);
    }
  } catch (e) {
    document.getElementById('fileList').innerHTML = '<div class="empty-state">无法连接到远程服务器</div>';
  }
}

async function loadMonths(autoSelect) {
  const year = document.getElementById('selYear').value;

  toolbar.style.display = 'flex';

    currentFileContent = '';
    document.getElementById('publishDropdown').style.display = 'none';

    try {
      const res = await fetch('/api/archive/file?path=' + encodeURIComponent(path));

// === Markdown Renderer ===
function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre><code>' + escHtml(code.trim()) + '</code></pre>';
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headings
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Blockquote
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered list
  text = text.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Paragraphs: double newline
  text = text.replace(/\n\n+/g, '\n</p><p>\n');
  // Single newline within paragraph -> <br>
  text = text.replace(/\n/g, '<br>\n');
  // Wrap in paragraph
  text = '<p>' + text + '</p>';
  // Clean up empty paragraphs
  text = text.replace(/<p>\s*<\/p>/g, '');
  text = text.replace(/<p>\s*(<h[123]>)/g, '$1');
  text = text.replace(/(<\/h[123]>)\s*<\/p>/g, '$1');
  text = text.replace(/<p>\s*(<pre>)/g, '$1');
  text = text.replace(/(<\/pre>)\s*<\/p>/g, '$1');
  text = text.replace(/<p>\s*(<ul>)/g, '$1');
  text = text.replace(/(<\/ul>)\s*<\/p>/g, '$1');
  text = text.replace(/<p>\s*(<blockquote>)/g, '$1');
  text = text.replace(/(<\/blockquote>)\s*<\/p>/g, '$1');
  return text;
}

function drawWeeklyChart(data) {
  const canvas = document.getElementById('weeklyChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 200;
  ctx.clearRect(0, 0, W, H);

  if (!data.length) { ctx.fillStyle = '#8892a4'; ctx.font = '13px sans-serif'; ctx.fillText('暂无数据', W/2-30, H/2); return; }

  const pad = {top:20, right:20, bottom:30, left:40};
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;
  const maxVal = Math.max(...data.map(d => d.count), 1);
  const barW = Math.max(cw / data.length * 0.6, 4);
  const gap = cw / data.length;

  // Y axis
  ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch * (1 - i/4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8892a4'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal * i/4), pad.left - 6, y + 4);
  }

  data.forEach((d, i) => {
    const x = pad.left + gap * i + gap/2 - barW/2;
    const totalH = (d.count / maxVal) * ch;
    const textH = (d.text_count / maxVal) * ch;
    const imgH = (d.image_count / maxVal) * ch;
    const y = pad.top + ch - totalH;
    // Text bar (bottom)
    ctx.fillStyle = '#4fc3f7';
    ctx.fillRect(x, y + imgH, barW, textH);
    // Image bar (top)
    ctx.fillStyle = '#66bb6a';
    ctx.fillRect(x, y, barW, imgH);
    // Label
    ctx.fillStyle = '#8892a4'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    const label = d.label.split('-W')[1] || d.label;
    ctx.fillText('W' + label, pad.left + gap * i + gap/2, H - 8);
  });

  // Legend
  ctx.fillStyle = '#4fc3f7'; ctx.fillRect(W - 120, 6, 10, 10);
  ctx.fillStyle = '#8892a4'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('文本', W - 106, 15);
  ctx.fillStyle = '#66bb6a'; ctx.fillRect(W - 60, 6, 10, 10);
  ctx.fillStyle = '#8892a4'; ctx.fillText('图片', W - 46, 15);
}

function drawTypeChart(textCount, imageCount) {
  const canvas = document.getElementById('typeChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 200;
  ctx.clearRect(0, 0, W, H);

  const total = textCount + imageCount;
  if (total === 0) { ctx.fillStyle = '#8892a4'; ctx.font = '13px sans-serif'; ctx.fillText('暂无数据', W/2-30, H/2); return; }

  const cx = W / 2, cy = H / 2 - 5;
  const r = Math.min(cx, cy) - 30;
  const textAngle = (textCount / total) * Math.PI * 2;

  // Text slice
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + textAngle);
  ctx.closePath();
  ctx.fillStyle = '#4fc3f7';
  ctx.fill();

  // Image slice
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, -Math.PI/2 + textAngle, -Math.PI/2 + Math.PI*2);
  ctx.closePath();
  ctx.fillStyle = '#66bb6a';
  ctx.fill();

  // Center hole (donut)
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
  ctx.fillStyle = '#1f2b47';
  ctx.fill();

  // Labels
  ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  if (textCount > 0) {
    const tAngle = -Math.PI/2 + textAngle/2;
    const lx = cx + (r*0.75) * Math.cos(tAngle);
    const ly = cy + (r*0.75) * Math.sin(tAngle);
    ctx.fillStyle = '#fff'; ctx.fillText(Math.round(textCount/total*100)+'%', lx, ly+4);
  }
  if (imageCount > 0) {
    const iAngle = -Math.PI/2 + textAngle + (Math.PI*2 - textAngle)/2;
    const lx = cx + (r*0.75) * Math.cos(iAngle);
    const ly = cy + (r*0.75) * Math.sin(iAngle);
    ctx.fillStyle = '#fff'; ctx.fillText(Math.round(imageCount/total*100)+'%', lx, ly+4);
  }

  // Legend
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#4fc3f7'; ctx.fillRect(10, H-24, 10, 10);
  ctx.fillStyle = '#e6e6e6'; ctx.textAlign = 'left'; ctx.fillText('文本 ' + textCount, 24, H-15);
  ctx.fillStyle = '#66bb6a'; ctx.fillRect(W/2, H-24, 10, 10);
  ctx.fillStyle = '#e6e6e6'; ctx.fillText('图片 ' + imageCount, W/2+14, H-15);
}

function drawDailyChart(data) {
  const canvas = document.getElementById('dailyChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 200;
  ctx.clearRect(0, 0, W, H);

  if (!data.length) { ctx.fillStyle = '#8892a4'; ctx.font = '13px sans-serif'; ctx.fillText('暂无数据', W/2-30, H/2); return; }

  const pad = {top:20, right:20, bottom:30, left:40};
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;
  const maxVal = Math.max(...data.map(d => d.count), 1);

  // Y axis
  ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch * (1 - i/4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8892a4'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal * i/4), pad.left - 6, y + 4);
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#4fc3f7';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  const step = cw / (data.length - 1 || 1);
  data.forEach((d, i) => {
    const x = pad.left + step * i;
    const y = pad.top + ch - (d.count / maxVal) * ch;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill area
  ctx.lineTo(pad.left + step * (data.length - 1), pad.top + ch);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.closePath();
  ctx.fillStyle = 'rgba(79, 195, 247, 0.1)';
  ctx.fill();

  // Dots
  data.forEach((d, i) => {
    const x = pad.left + step * i;
    const y = pad.top + ch - (d.count / maxVal) * ch;
    if (d.count > 0) {
      ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2);
      ctx.fillStyle = '#4fc3f7'; ctx.fill();
    }
  });

  // X labels (every 5 days)
  ctx.fillStyle = '#8892a4'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  data.forEach((d, i) => {
    if (i % 5 === 0 || i === data.length - 1) {
      const x = pad.left + step * i;
      ctx.fillText(d.date.substring(5), x, H - 8);
    }
  });
}

// === Search ===
let searchKeyword = '';

async function searchArchive() {
  const input = document.getElementById('searchInput');
  const keyword = input.value.trim();
  if (!keyword) { showToast('请输入搜索关键词'); return; }
  searchKeyword = keyword;

  const resultsEl = document.getElementById('searchResults');
  const fileListEl = document.getElementById('fileList');
  const breadcrumbEl = document.querySelector('.archive-breadcrumb');

  resultsEl.innerHTML = '<div class="empty-state">搜索中...</div>';
  resultsEl.style.display = 'block';
  fileListEl.style.display = 'none';
  breadcrumbEl.style.display = 'none';

  try {
    const results = await api('/api/search?q=' + encodeURIComponent(keyword));
    if (!results.length) {
      resultsEl.innerHTML = '<div class="empty-state">未找到匹配结果</div>';
      return;
    }
    resultsEl.innerHTML = '';
    results.forEach(r => {
      const div = document.createElement('div');
      div.className = 'search-result-item';
      const highlighted = highlightMatch(escHtml(r.content), keyword);
      div.innerHTML =
        '<div class="search-result-path">' + escHtml(r.path) + ' : ' + r.line + '</div>' +
        '<div class="search-result-content">' + highlighted + '</div>';
      div.onclick = function() { openSearchResult(r.path); };
      resultsEl.appendChild(div);
    });
  } catch (e) {
    resultsEl.innerHTML = '<div class="empty-state">搜索失败</div>';
  }
}

function highlightMatch(text, keyword) {
  if (!keyword) return text;
  const re = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<span class="search-highlight">$1</span>');
}

function openSearchResult(path) {
  // 从路径解析 年/月/日/文件名
  const parts = path.split('/');
  if (parts.length >= 4) {
    const year = parts[0], month = parts[1], day = parts[2], fileName = parts.slice(3).join('/');
    document.getElementById('selYear').value = year;
    document.getElementById('selMonth').innerHTML = '<option value="' + month + '">' + month + ' 月</option>';
    document.getElementById('selMonth').value = month;
    document.getElementById('selDay').innerHTML = '<option value="' + day + '">' + day + ' 日</option>';
    document.getElementById('selDay').value = day;
  }
  // 隐藏搜索结果，显示文件列表
  document.getElementById('searchResults').style.display = 'none';
  document.querySelector('.archive-breadcrumb').style.display = 'flex';
  document.getElementById('fileList').style.display = 'block';

  // 直接预览该文件
  const relPath = path;
  previewFile(relPath, parts[parts.length-1], null);
}

function clearSearch() {
  document.getElementById('searchResults').style.display = 'none';
  document.querySelector('.archive-breadcrumb').style.display = 'flex';
  document.getElementById('fileList').style.display = 'block';
}

function togglePublishMenu() {

async function publishContent(target) {
  const menu = document.getElementById('publishMenu');
  const item = menu.querySelector('[data-target="'+target+'"]');
  menu.classList.remove('open');

  // Strip YAML frontmatter for publish
  let content = currentFileContent || '';
  if (content.startsWith('---')) {
    const end = content.indexOf('---', 3);
    if (end > 0) content = content.substring(end + 3).trim();
  }
  if (!content) { showToast('无内容可发布'); return; }

  showToast('正在发布到 ' + target + '...');

  try {
    const res = await fetch('/api/publish', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content: content, targets: [target]})
    });
    const results = await res.json();
    const r = results[0];
    if (r && r.ok) {
      showToast('已发布到 ' + target);
    } else {
      showToast('发布失败: ' + (r ? r.error : '未知错误'));
    }
  } catch (e) {
    showToast('发布请求失败');
  }
}

// === Status ===
let adminStatus = null;
let adminTimer = null;

async function loadStatus() {
  try {
    const s = await api('/api/status');
    adminStatus = s;
    const el = document.getElementById('headerStatus');
    const sshDot = s.ssh_connected ? '<span class="status-dot on"></span>' : '<span class="status-dot off"></span>';
    const daemonDot = s.daemon_running ? '<span class="status-dot on"></span>' : '<span class="status-dot off"></span>';

      '<span>' + daemonDot + '守护进程</span>' +
      '<span>' + sshDot + 'SSH</span>' +

// === Admin ===
async function loadAdminStatus() {
  try {
    const s = await api('/api/status');
    s._fetchedAt = Date.now();
    adminStatus = s;
    document.getElementById('adminPid').textContent = s.pid || '-';
    document.getElementById('adminVersion').textContent = s.version || '-';
    document.getElementById('adminStartTime').textContent = s.start_time || '-';
    document.getElementById('adminSyncs').textContent = s.total_syncs || 0;
    updateUptime();
    if (adminTimer) clearInterval(adminTimer);
    adminTimer = setInterval(updateUptime, 1000);
  } catch (e) {}
}

async function loadAIConfig() {
  try {
    const data = await api('/api/config/ai');
    const cfg = data.config;
    document.getElementById('aiSettingsLoading').style.display = 'none';
    document.getElementById('aiSettingsForm').style.display = 'block';
    document.getElementById('aiEnabled').checked = cfg.enabled;
    document.getElementById('aiEndpoint').value = cfg.endpoint || '';
    document.getElementById('aiApiKey').value = '';
    document.getElementById('aiModel').value = cfg.model || '';
    document.getElementById('aiPrompt').value = cfg.prompt || '';
    document.getElementById('aiPreset').value = cfg.preset || 'custom';
    // 恢复提示词模板选中状态
    if (cfg.prompt_template) {
      const tmplOpts = document.getElementById('aiPromptTemplate').options;
      for (let i = 0; i < tmplOpts.length; i++) {
        if (tmplOpts[i].textContent === cfg.prompt_template) {
          tmplOpts[i].selected = true;
          break;
        }
      }
    }

    const presetSel = document.getElementById('aiPreset');
    presetSel.innerHTML = '<option value="custom">自定义</option>';
    if (data.presets) {
      for (const [key, val] of Object.entries(data.presets)) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = val.label || key;
        if (cfg.preset === key) opt.selected = true;
        presetSel.appendChild(opt);
      }
    }
    presetSel.onchange = function() {
      const p = data.presets && data.presets[this.value];
      if (p) {
        document.getElementById('aiEndpoint').value = p.endpoint;
        document.getElementById('aiModel').value = p.model;
      }
    };

    const tmplSel = document.getElementById('aiPromptTemplate');
    tmplSel.innerHTML = '<option value="">通用模式（默认）</option>';
    if (data.prompt_templates) {
      for (const [key, val] of Object.entries(data.prompt_templates)) {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = key;
        tmplSel.appendChild(opt);
      }
    }
    tmplSel.onchange = function() {
      if (this.value) {
        document.getElementById('aiPrompt').value = this.value;
      }
    };
  } catch (e) {}
}

async function saveAIConfig() {
  const body = {
    enabled: document.getElementById('aiEnabled').checked,
    preset: document.getElementById('aiPreset').value,
    endpoint: document.getElementById('aiEndpoint').value,
    api_key: document.getElementById('aiApiKey').value,
    model: document.getElementById('aiModel').value,
    prompt: document.getElementById('aiPrompt').value,
    prompt_template: document.getElementById('aiPromptTemplate').selectedOptions[0]?.textContent || '',
  };
  try {
    const res = await fetch('/api/config/ai', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.error) {
      showToast('保存失败: ' + data.error);
    } else {
      showToast('AI 设置已保存');
      loadAIConfig();
    }
  } catch (e) {
    showToast('保存失败: ' + e.message);
  }
}

function updateUptime() {
  if (!adminStatus || adminStatus._fetchedAt === undefined) return;
  const sec = adminStatus.uptime + Math.floor((Date.now() - adminStatus._fetchedAt) / 1000);
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  let str = '';
  if (d > 0) str += d + ' 天 ';
  str += h + ' 小时 ' + m + ' 分钟 ' + s + ' 秒';
  document.getElementById('adminUptime').textContent = str;
}

async function restartKnowly() {
  if (!confirm('确定要重启 Knowly 吗？')) return;
  try {
    await fetch('/api/admin/restart', { method: 'POST' });
    showToast('正在重启，等待服务就绪...');
    setTimeout(() => { reloadWhenReady(); }, 3000);
  } catch (e) {
    showToast('重启请求已发送，等待服务就绪...');
    setTimeout(() => { reloadWhenReady(); }, 3000);
  }
}

async function updateKnowly() {
  if (!confirm('确定要从源码编译并更新吗？')) return;
  const btn = document.getElementById('updateBtn');
  btn.disabled = true;
  btn.textContent = '更新中...';
  try {
    const resp = await fetch('/api/admin/update', { method: 'POST' });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let done = false;
    while (!done) {
      const { value, done: d } = await reader.read();
      done = d;
      if (value) {
        const text = decoder.decode(value);
        text.split('\n').forEach(line => {
          if (line.startsWith('data: ')) {
            try {
              const ev = JSON.parse(line.slice(6));
              btn.textContent = ev.message;
              if (ev.step === 'error') {
                showToast(ev.message);
                btn.disabled = false;
                btn.textContent = '更新';
              }
              if (ev.step === 'done') {
                showToast('更新完成，等待服务就绪...');
                setTimeout(() => { reloadWhenReady(); }, 2000);
              }
            } catch(e) {}
          }
        });
      }
    }
  } catch (e) {
    showToast('更新请求已发送，等待服务就绪...');
    setTimeout(() => { reloadWhenReady(); }, 3000);
  }
}

function reloadWhenReady() {
  fetch('/api/status', { cache: 'no-store' }).then(r => {
    if (r.ok) location.reload();
    else throw new Error();
  }).catch(() => {
    setTimeout(() => { reloadWhenReady(); }, 2000);
  });
}

async function releaseKnowly() {
  if (!confirm('确定要发布新版本吗？（git push → npm version minor → git push --tags）')) return;
  const btn = document.getElementById('releaseBtn');
  btn.disabled = true;
  btn.textContent = '发布中...';
  try {
    const resp = await fetch('/api/admin/release', { method: 'POST' });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let done = false;
    while (!done) {
      const { value, done: d } = await reader.read();
      done = d;
      if (value) {
        const text = decoder.decode(value);
        text.split('\n').forEach(line => {
          if (line.startsWith('data: ')) {
            try {
              const ev = JSON.parse(line.slice(6));
              btn.textContent = ev.message;
              if (ev.step === 'error') {
                showToast(ev.message);
                btn.disabled = false;
                btn.textContent = '发布';
              }

// === Util ===
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) {
  return JSON.stringify(s).replace(/'/g, "\\'");
}

// === Theme ===
function setTheme(t) {
  if (t === 'default') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('knowly-theme', t);
  document.querySelectorAll('.theme-option').forEach(o => o.classList.toggle('active', o.dataset.theme === t));
  document.getElementById('themeDropdown').classList.remove('show');
}
function toggleThemeMenu() {
  document.getElementById('themeDropdown').classList.toggle('show');
}
(function() {
  var t = localStorage.getItem('knowly-theme') || 'default';
  if (t !== 'default') document.documentElement.setAttribute('data-theme', t);
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.header-left')) {
      document.getElementById('themeDropdown').classList.remove('show');
    }
  });
})();
